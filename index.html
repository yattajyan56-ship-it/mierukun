<style>
:root {
  --bg: #0e0e10;
  --surface: #18181c;
  --surface2: #22222a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f0;
  --text-muted: #888;
  --text-dim: #555;
  --accent: #c8ff00;
  --accent-dim: rgba(200,255,0,0.12);
  --accent-dim2: rgba(200,255,0,0.06);
  --del-bg: rgba(255,80,80,0.18);
  --del-text: #ff9090;
  --ins-bg: rgba(120,255,120,0.15);
  --ins-text: #90ff90;
  --radius: 12px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif}

/* BG texture */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 15% 0%, rgba(200,255,0,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 85% 100%, rgba(100,100,255,0.05) 0%, transparent 70%);
  z-index:0;
}

.container{max-width:960px;margin:0 auto;padding:48px 24px 120px;position:relative;z-index:1}

/* HEADER */
header{margin-bottom:48px}
.logo-row{display:flex;align-items:baseline;gap:12px;margin-bottom:8px}
.logo{font-size:32px;font-weight:900;letter-spacing:-1px;color:var(--text)}
.logo span{color:var(--accent)}
.tagline{font-size:13px;color:var(--text-muted);letter-spacing:0.5px}
.badge-row{display:flex;gap:8px;margin-top:12px}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid var(--border2);color:var(--text-muted);letter-spacing:0.3px}

/* TABS */
.tab-bar{display:flex;gap:4px;margin-bottom:28px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;width:fit-content}
.tab{padding:8px 24px;font-size:14px;font-weight:500;font-family:'Zen Kaku Gothic New',sans-serif;cursor:pointer;border:none;background:none;color:var(--text-muted);border-radius:var(--radius-sm);transition:all .2s;letter-spacing:0.2px}
.tab.active{background:var(--accent);color:#0e0e10;font-weight:700}
.tab:hover:not(.active){color:var(--text);background:var(--surface2)}

/* PANELS */
.panel{display:none;animation:fadeIn .2s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* TEXT PANEL */
.editors{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.editor-wrap{display:flex;flex-direction:column;gap:8px}
.editor-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase}
.editor-label .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px}
.dot-before{background:#ff6060}
.dot-after{background:var(--accent)}
textarea{
  width:100%;height:280px;resize:vertical;
  border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;
  font-size:13px;font-family:'JetBrains Mono',monospace;
  background:var(--surface);color:var(--text);
  line-height:1.7;
  transition:border-color .2s;
  outline:none;
}
textarea:focus{border-color:var(--border2)}
textarea::placeholder{color:var(--text-dim)}

/* DIFF RESULT */
.diff-summary{display:flex;gap:16px;margin-bottom:10px;font-size:12px}
.sum-add{color:var(--ins-text)}.sum-del{color:var(--del-text)}
.diff-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.diff-col-head{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px}
.diff-box{
  border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;min-height:60px;
  font-size:13px;font-family:'JetBrains Mono',monospace;
  background:var(--surface);line-height:1.9;
  white-space:pre-wrap;word-break:break-all;color:var(--text);
}
.diff-box .del{background:var(--del-bg);color:var(--del-text);border-radius:3px;padding:0 2px}
.diff-box .ins{background:var(--ins-bg);color:var(--ins-text);border-radius:3px;padding:0 2px}
.no-diff{font-size:13px;color:var(--text-dim);text-align:center;padding:20px;font-style:italic}

/* IMAGE PANEL */
.drop-area{
  border:1.5px dashed var(--border2);border-radius:var(--radius);
  min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;cursor:pointer;background:var(--surface);
  transition:border-color .2s,background .2s;position:relative;padding:24px;
}
.drop-area.over{border-color:var(--accent);background:var(--accent-dim2)}
.drop-area.loaded{min-height:auto;border-style:solid}
.drop-icon{width:36px;height:36px;opacity:0.4}
.drop-main{font-size:14px;color:var(--text-muted)}
.drop-sub{font-size:12px;color:var(--text-dim)}
.thumb-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;justify-content:center;padding:4px}
.img-thumb{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px}
.img-thumb img{width:110px;height:110px;object-fit:contain;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg)}
.thumb-name{font-size:10px;color:var(--text-muted);font-weight:700;letter-spacing:0.8px}
.thumb-rm{
  position:absolute;top:-6px;right:-6px;
  width:20px;height:20px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border2);
  cursor:pointer;font-size:11px;color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;line-height:1;
  transition:background .15s;
}
.thumb-rm:hover{background:var(--del-bg);color:var(--del-text)}
.add-more{font-size:12px;color:var(--text-dim);border:1px dashed var(--border);border-radius:var(--radius-sm);padding:6px 14px;margin-left:4px}

/* IMG CONTROLS */
.controls-row{display:flex;align-items:center;gap:16px;padding:16px 0;flex-wrap:wrap}
.ctrl-label{font-size:12px;color:var(--text-muted);letter-spacing:0.3px;white-space:nowrap}
.speed-val{font-size:13px;font-weight:700;color:var(--accent);min-width:44px}
input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;height:3px;
  background:var(--border2);border-radius:99px;outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--accent);cursor:pointer;
  box-shadow:0 0 0 3px rgba(200,255,0,0.2);
}
.play-btn{
  padding:8px 20px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);
  background:none;color:var(--text);font-size:13px;font-weight:700;
  font-family:'Zen Kaku Gothic New',sans-serif;cursor:pointer;
  transition:all .2s;letter-spacing:0.3px;
}
.play-btn:hover{border-color:var(--accent);color:var(--accent)}
.play-btn.running{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* PREVIEW */
.preview-outer{position:relative;margin-top:4px}
.preview-wrap{
  border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;
  min-height:200px;
  height:340px;
  resize:vertical;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface);
}
.preview-wrap canvas{max-width:100%;max-height:100%;display:block}
.resize-hint{font-size:11px;color:var(--text-dim);text-align:right;padding:3px 2px 0;}
.empty-msg{font-size:13px;color:var(--text-dim)}
.img-badge{
  position:absolute;bottom:12px;right:14px;
  font-size:11px;font-weight:700;letter-spacing:1px;
  padding:4px 12px;border-radius:99px;
  background:rgba(14,14,16,0.8);border:1px solid var(--border2);
  color:var(--text-muted);backdrop-filter:blur(6px);
  display:none;pointer-events:none;
}

/* FOOTER / ACTION BAR */
.action-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(14,14,16,0.85);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  padding:14px 24px;
  display:flex;justify-content:center;
}
.diff-btn{
  padding:12px 52px;border-radius:var(--radius-sm);border:none;
  background:var(--accent);color:#0e0e10;
  font-size:15px;font-weight:900;font-family:'Zen Kaku Gothic New',sans-serif;
  cursor:pointer;letter-spacing:0.5px;
  transition:all .15s;
  box-shadow:0 0 24px rgba(200,255,0,0.2);
}
.diff-btn:hover{transform:translateY(-1px);box-shadow:0 4px 32px rgba(200,255,0,0.35)}
.diff-btn:active{transform:scale(0.98)}

/* RESPONSIVE */
@media(max-width:640px){
  .editors,.diff-cols{grid-template-columns:1fr}
  .logo{font-size:24px}
  .container{padding:32px 16px 100px}
  header{margin-bottom:32px}
}

/* PRINT / PDF */
@media print{
  body{background:#fff !important;color:#111 !important}
  body::before{display:none}
  .action-bar,.tab-bar,.editors,header .badge-row,.tagline{display:none !important}
  .container{padding:20px !important;max-width:100% !important}
  .panel{display:block !important}
  #image-panel{display:none !important}
  .logo{color:#111 !important;font-size:22px}
  .logo span{color:#2a7a00 !important}
  header{margin-bottom:16px}
  .diff-summary{margin-bottom:8px}
  .sum-add{color:#166534 !important}
  .sum-del{color:#991f1f !important}
  .diff-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .diff-col-head{color:#555 !important;font-size:10px}
  .diff-box{
    background:#f9f9f9 !important;color:#111 !important;
    border:1px solid #ddd !important;
    font-size:11px !important;line-height:1.7 !important;
    page-break-inside:avoid;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .diff-box .del{background:#fee2e2 !important;color:#991f1f !important}
  .diff-box .ins{background:#dcfce7 !important;color:#166534 !important}
  .no-diff{color:#888 !important}
  .print-meta{display:block !important}
}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-row">
      <div class="logo">差分<span>見えるくん</span></div>
    </div>
    <div class="tagline">テキストと画像の差分を、かんたんに確認できるツール</div>
    <div class="badge-row">
      <span class="badge">テキスト差分</span>
      <span class="badge">画像比較</span>
      <span class="badge">文字単位ハイライト</span>
      <span class="badge">無料・登録不要</span>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('text',this)">テキスト</button>
    <button class="tab" onclick="switchTab('image',this)">画像</button>
  </div>

  <!-- TEXT PANEL -->
  <div id="text-panel" class="panel active">
    <div class="editors">
      <div class="editor-wrap">
        <div class="editor-label"><span class="dot dot-before"></span>修正前</div>
        <textarea id="ta-before" placeholder="修正前のテキストをここに貼り付け..." oninput="updateCount()"></textarea>
        <div style="font-size:11px;color:var(--text-dim);text-align:right;padding:2px 2px 0"><span id="count-before">0</span> 文字</div>
      </div>
      <div class="editor-wrap">
        <div class="editor-label"><span class="dot dot-after"></span>修正後</div>
        <textarea id="ta-after" placeholder="修正後のテキストをここに貼り付け..." oninput="updateCount()"></textarea>
        <div style="font-size:11px;color:var(--text-dim);text-align:right;padding:2px 2px 0"><span id="count-after">0</span> 文字</div>
      </div>
    </div>
    <div id="diff-result"></div>
    <div class="print-meta" style="display:none;font-size:11px;color:#888;margin-top:16px;border-top:1px solid #eee;padding-top:8px" id="print-meta"></div>
  </div>

  <!-- IMAGE PANEL -->
  <div id="image-panel" class="panel">
    <div class="drop-area" id="drop-zone"
      ondragover="onDragOver(event)" ondragleave="onDragLeave()" ondrop="onDrop(event)" onclick="triggerFile()">
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span class="drop-main" id="drop-main-text">クリックまたはドラッグ＆ドロップで画像を2枚選択</span>
      <span class="drop-sub" id="drop-hint">PNG / JPG / GIF / WebP 対応</span>
      <div id="thumb-container" class="thumb-row" style="display:none"></div>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="loadFiles(event)">

    <div class="controls-row">
      <span class="ctrl-label">切り替え速度</span>
      <input type="range" id="speed-range" min="200" max="3000" step="100" value="1000" oninput="updateSpeed(this.value)">
      <span class="speed-val" id="speed-label">1.0秒</span>
      <button class="play-btn" id="toggle-btn" onclick="togglePlay()">▶ 再生</button>
      <button class="play-btn" id="gif-btn" onclick="exportGif()" style="border-color:rgba(200,255,0,0.4);color:var(--accent)" disabled>GIF書き出し</button>
      <button class="play-btn" id="mp4-btn" onclick="exportMp4()" style="border-color:rgba(200,255,0,0.4);color:var(--accent)" disabled>動画書き出し</button>
    </div>
    <div id="gif-status" style="font-size:12px;color:var(--text-muted);padding:4px 0;min-height:20px"></div>

    <div class="preview-outer">
      <div class="preview-wrap" id="preview-wrap">
        <span class="empty-msg">2枚の画像を読み込むと比較が始まります</span>
      </div>
      <span class="img-badge" id="cmp-label"></span>
    </div>
    <div class="resize-hint">↕ 下端をドラッグしてサイズ変更</div>
  </div>

</div>

<div class="action-bar" id="action-bar">
  <button class="diff-btn" onclick="runDiff()">差分を表示</button>
  <button class="diff-btn" id="pdf-btn" onclick="exportPdf()" style="background:none;border:1.5px solid rgba(200,255,0,0.5);color:var(--accent);margin-left:10px;box-shadow:none;display:none">PDF書き出し</button>
  <button class="diff-btn" id="share-btn" onclick="shareDiff()" style="background:none;border:1.5px solid rgba(200,255,0,0.5);color:var(--accent);margin-left:10px;box-shadow:none;display:none">🔗 共有リンクを作成</button>
</div>

<!-- share modal -->
<div id="share-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:28px 32px;max-width:560px;width:90%;position:relative">
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px">共有リンク</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">このURLを共有すると、受け取った人が同じ差分を確認できます</div>
    <div style="display:flex;gap:8px">
      <input id="share-url-input" type="text" readonly
        style="flex:1;padding:10px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none">
      <button onclick="copyShareUrl()" style="padding:10px 18px;background:var(--accent);color:#0e0e10;border:none;border-radius:var(--radius-sm);font-weight:700;font-size:13px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif">コピー</button>
    </div>
    <div id="share-warn" style="font-size:11px;color:var(--text-dim);margin-top:10px"></div>
    <button onclick="document.getElementById('share-modal').style.display='none'" style="position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer">✕</button>
  </div>
</div>

<script>
var currentTab='text';
var imgA=null,imgB=null,srcA='',srcB='';
var playInterval=null;
var showingA=true;
var intervalMs=1000;
var previewCanvas=null;
var dpr=window.devicePixelRatio||1;

function switchTab(name,el){
  currentTab=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(name+'-panel').classList.add('active');
  document.getElementById('action-bar').style.display=name==='text'?'flex':'none';
}

function updateCount(){
  var b=document.getElementById('ta-before').value;
  var a=document.getElementById('ta-after').value;
  document.getElementById('count-before').textContent=b.length;
  document.getElementById('count-after').textContent=a.length;
}

// ---- TEXT DIFF ----
function runDiff(){
  var before=document.getElementById('ta-before').value;
  var after=document.getElementById('ta-after').value;
  var res=document.getElementById('diff-result');
  var pdfBtn=document.getElementById('pdf-btn');
  if(!before&&!after){res.innerHTML='';pdfBtn.style.display='none';return;}
  var ops=charDiff(before,after);
  var leftHtml='',rightHtml='',adds=0,dels=0;
  ops.forEach(function(op){
    if(op[0]===0){var e=esc(op[1]);leftHtml+=e;rightHtml+=e;}
    else if(op[0]===-1){leftHtml+='<span class="del">'+esc(op[1])+'</span>';dels+=op[1].length;}
    else if(op[0]===1){rightHtml+='<span class="ins">'+esc(op[1])+'</span>';adds+=op[1].length;}
  });
  var hasDiff=adds>0||dels>0;
  var beforeLen=before.length, afterLen=after.length;
  var diffLen=afterLen-beforeLen;
  var diffSign=diffLen>0?'＋':diffLen<0?'－':'';
  res.innerHTML=hasDiff
    ?'<div class="diff-summary"><span class="sum-del">－'+dels+'文字 削除</span><span class="sum-add">＋'+adds+'文字 追加</span><span style="color:var(--text-dim)">修正前: '+beforeLen+'文字</span><span style="color:var(--text-dim)">修正後: '+afterLen+'文字</span><span style="color:var(--text-muted)">差分: '+diffSign+Math.abs(diffLen)+'文字</span></div><div class="diff-cols"><div><div class="diff-col-head"><span class="dot dot-before" style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px"></span>修正前</div><div class="diff-box">'+leftHtml+'</div></div><div><div class="diff-col-head"><span class="dot dot-after" style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px"></span>修正後</div><div class="diff-box">'+rightHtml+'</div></div></div>'
    :'<div class="no-diff">差分はありません（'+beforeLen+'文字）</div>';
  // 差分があればPDF・共有ボタンを表示
  pdfBtn.style.display=hasDiff?'inline-block':'none';
  document.getElementById('share-btn').style.display=hasDiff?'inline-block':'none';
  // 印刷用メタ情報
  var meta=document.getElementById('print-meta');
  if(meta){
    var now=new Date();
    meta.textContent='出力日時: '+now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')
      +'　追加: ＋'+adds+'文字　削除: －'+dels+'文字　生成: 差分見えるくん';
  }
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function charDiff(a,b){
  var m=a.length,n=b.length;
  var dp=[];
  for(var i=0;i<=m;i++){dp[i]=new Uint16Array(n+1);}
  for(var i=1;i<=m;i++)for(var j=1;j<=n;j++){
    if(a[i-1]===b[j-1])dp[i][j]=dp[i-1][j-1]+1;
    else dp[i][j]=dp[i-1][j]>dp[i][j-1]?dp[i-1][j]:dp[i][j-1];
  }
  var ops=[];var i=m,j=n;
  while(i>0||j>0){
    if(i>0&&j>0&&a[i-1]===b[j-1]){ops.unshift([0,a[i-1]]);i--;j--;}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){ops.unshift([1,b[j-1]]);j--;}
    else{ops.unshift([-1,a[i-1]]);i--;}
  }
  var merged=[];
  ops.forEach(function(op){
    if(merged.length&&merged[merged.length-1][0]===op[0])merged[merged.length-1][1]+=op[1];
    else merged.push([op[0],op[1]]);
  });
  return merged;
}

// ---- IMAGE ----
function onDragOver(e){e.preventDefault();document.getElementById('drop-zone').classList.add('over');}
function onDragLeave(){document.getElementById('drop-zone').classList.remove('over');}
function onDrop(e){
  e.preventDefault();document.getElementById('drop-zone').classList.remove('over');
  var files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')).slice(0,2);
  if(files.length)processFiles(files);
}
function triggerFile(){if(imgA&&imgB)return;document.getElementById('file-input').click();}
function loadFiles(e){var files=Array.from(e.target.files).slice(0,2);if(files.length)processFiles(files);e.target.value='';}

function processFiles(files){
  var toLoad=files.length;
  var imgs=[null,null],srcs=['',''];
  files.forEach(function(f,idx){
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        imgs[idx]=img;srcs[idx]=ev.target.result;toLoad--;
        if(toLoad===0){
          if(files.length===1&&imgA){imgB=imgs[0];srcB=srcs[0];}
          else{imgA=imgs[0];srcA=srcs[0];if(imgs[1]){imgB=imgs[1];srcB=srcs[1];}}
          updateDropUI();if(imgA&&imgB)initPreview();
        }
      };img.src=ev.target.result;
    };reader.readAsDataURL(f);
  });
}

function updateDropUI(){
  var zone=document.getElementById('drop-zone');
  var tc=document.getElementById('thumb-container');
  var mt=document.getElementById('drop-main-text');
  var hint=document.getElementById('drop-hint');
  if(imgA||imgB){
    zone.classList.add('loaded');mt.style.display='none';hint.style.display='none';tc.style.display='flex';
    var html='';
    if(imgA)html+='<div class="img-thumb"><img src="'+srcA+'"><span class="thumb-rm" onclick="removeImg(event,\'a\')">×</span><div class="thumb-name">画像 A</div></div>';
    if(imgB)html+='<div class="img-thumb"><img src="'+srcB+'"><span class="thumb-rm" onclick="removeImg(event,\'b\')">×</span><div class="thumb-name">画像 B</div></div>';
    if(!(imgA&&imgB))html+='<span class="add-more">＋ もう1枚追加</span>';
    tc.innerHTML=html;
  } else {
    zone.classList.remove('loaded');mt.style.display='';hint.style.display='';tc.style.display='none';tc.innerHTML='';
  }
}

function removeImg(e,side){
  e.stopPropagation();stopPlay();
  if(side==='a'){imgA=null;srcA='';}else{imgB=null;srcB='';}
  updateDropUI();
  if(!(imgA&&imgB)){
    document.getElementById('preview-wrap').innerHTML='<span class="empty-msg">2枚の画像を読み込むと比較が始まります</span>';
    document.getElementById('cmp-label').style.display='none';previewCanvas=null;
    document.getElementById('gif-btn').disabled=true;
    document.getElementById('mp4-btn').disabled=true;
    document.getElementById('gif-status').textContent='';
  }
}

function initPreview(){
  document.getElementById('preview-wrap').innerHTML='<canvas id="cmp-canvas"></canvas>';
  previewCanvas=document.getElementById('cmp-canvas');
  showingA=true;drawImg(imgA,'画像 A');startPlay();
  document.getElementById('gif-btn').disabled=false;
  document.getElementById('mp4-btn').disabled=false;
}

function drawImg(img,label){
  var pw=document.getElementById('preview-wrap');
  var maxW=pw.clientWidth||800,maxH=pw.clientHeight||340;
  var scale=Math.min(maxW/img.naturalWidth,maxH/img.naturalHeight,1);
  var cssW=Math.round(img.naturalWidth*scale),cssH=Math.round(img.naturalHeight*scale);
  previewCanvas.style.width=cssW+'px';previewCanvas.style.height=cssH+'px';
  previewCanvas.width=cssW*dpr;previewCanvas.height=cssH*dpr;
  var ctx=previewCanvas.getContext('2d');
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  ctx.scale(dpr,dpr);ctx.drawImage(img,0,0,cssW,cssH);
  var badge=document.getElementById('cmp-label');badge.textContent=label;badge.style.display='block';
}

function startPlay(){
  stopPlay();
  var btn=document.getElementById('toggle-btn');btn.textContent='■ 停止';btn.classList.add('running');
  playInterval=setInterval(function(){
    if(!imgA||!imgB){stopPlay();return;}
    showingA=!showingA;drawImg(showingA?imgA:imgB,showingA?'画像 A':'画像 B');
  },intervalMs);
}
function stopPlay(){
  if(playInterval)clearInterval(playInterval);playInterval=null;
  var btn=document.getElementById('toggle-btn');btn.textContent='▶ 再生';btn.classList.remove('running');
}
function togglePlay(){if(playInterval)stopPlay();else if(imgA&&imgB)startPlay();}
function updateSpeed(v){
  intervalMs=parseInt(v);
  document.getElementById('speed-label').textContent=(intervalMs/1000).toFixed(1)+'秒';
  if(playInterval&&imgA&&imgB)startPlay();
}

// ---- VIDEO EXPORT (MediaRecorder) ----
function exportMp4(){
  if(!imgA||!imgB)return;
  var btn=document.getElementById('mp4-btn');
  var statusEl=document.getElementById('gif-status');
  btn.disabled=true;
  document.getElementById('gif-btn').disabled=true;

  // 出力サイズ
  var natW=Math.max(imgA.naturalWidth,imgB.naturalWidth);
  var natH=Math.max(imgA.naturalHeight,imgB.naturalHeight);
  var maxSide=1280;
  var scale=Math.min(maxSide/natW,maxSide/natH,1);
  var W=Math.round(natW*scale);
  var H=Math.round(natH*scale);

  // offscreen canvas
  var c=document.createElement('canvas');
  c.width=W;c.height=H;
  var ctx=c.getContext('2d');

  // MediaRecorder対応フォーマットを自動判定
  var mime='video/webm;codecs=vp9';
  if(!MediaRecorder.isTypeSupported(mime))mime='video/webm;codecs=vp8';
  if(!MediaRecorder.isTypeSupported(mime))mime='video/webm';
  if(!MediaRecorder.isTypeSupported(mime)){
    statusEl.textContent='このブラウザは動画書き出しに対応していません。';
    btn.disabled=false;document.getElementById('gif-btn').disabled=false;
    return;
  }

  var stream=c.captureStream(60);
  var recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8000000});
  var chunks=[];
  recorder.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};

  // 総再生時間：切り替えを5回繰り返す（A→B→A→B→A→B）
  var totalCycles=3; // A+B で1サイクル
  var totalFrames=totalCycles*2;
  var frameDuration=intervalMs; // ms per frame
  var totalDuration=totalFrames*frameDuration;

  recorder.onstop=function(){
    var ext=mime.includes('mp4')?'mp4':'webm';
    var blob=new Blob(chunks,{type:mime});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='diff-animation.'+ext;
    a.click();
    setTimeout(function(){URL.revokeObjectURL(url);},5000);
    btn.disabled=false;document.getElementById('gif-btn').disabled=false;
    statusEl.textContent='✓ ダウンロード完了！（'+Math.round(blob.size/1024)+'KB・'+ext.toUpperCase()+'）';
    setTimeout(function(){statusEl.textContent='';},4000);
  };

  recorder.start();
  statusEl.textContent='動画を録画中...';

  var frameIndex=0;
  function drawFrame(){
    var img=frameIndex%2===0?imgA:imgB;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    ctx.drawImage(img,0,0,W,H);
    frameIndex++;
    var remaining=totalFrames-frameIndex;
    statusEl.textContent='動画を録画中... ('+frameIndex+'/'+totalFrames+')';
    if(frameIndex<totalFrames){
      setTimeout(drawFrame,frameDuration);
    } else {
      // 最後のフレームを少し保持してから停止
      setTimeout(function(){recorder.stop();},frameDuration);
    }
  }

  // 最初のフレームを描いてから開始
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  ctx.drawImage(imgA,0,0,W,H);
  setTimeout(drawFrame,frameDuration);
}
// LZW + GIF89a encoder
function exportGif(){
  if(!imgA||!imgB)return;
  var btn=document.getElementById('gif-btn');
  var statusEl=document.getElementById('gif-status');
  btn.disabled=true;
  statusEl.textContent='GIFを生成中...';

  setTimeout(function(){
    try{
      var natW=Math.max(imgA.naturalWidth,imgB.naturalWidth);
      var natH=Math.max(imgA.naturalHeight,imgB.naturalHeight);
      var maxSide=800;
      var scale=Math.min(maxSide/natW,maxSide/natH,1);
      var W=Math.round(natW*scale);
      var H=Math.round(natH*scale);

      var c=document.createElement('canvas');
      c.width=W;c.height=H;
      var ctx=c.getContext('2d');

      function getRGBA(img){
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
        ctx.drawImage(img,0,0,W,H);
        return ctx.getImageData(0,0,W,H).data;
      }

      var rgbaA=getRGBA(imgA);
      var rgbaB=getRGBA(imgB);

      // メディアンカット法で256色パレット生成
      function medianCut(rgba,maxColors){
        // ピクセル配列を作る（サンプリングして高速化）
        var pixels=[];
        var step=Math.max(1,Math.floor(rgba.length/4/4000)); // 最大4000サンプル
        for(var i=0;i<rgba.length;i+=4*step){
          pixels.push([rgba[i],rgba[i+1],rgba[i+2]]);
        }
        // 再帰的に分割
        function cut(pixels,depth){
          if(depth===0||pixels.length===0){
            // このバケツの平均色を返す
            var r=0,g=0,b=0;
            for(var i=0;i<pixels.length;i++){r+=pixels[i][0];g+=pixels[i][1];b+=pixels[i][2];}
            var n=pixels.length||1;
            return[[Math.round(r/n),Math.round(g/n),Math.round(b/n)]];
          }
          // 最もレンジが広いチャンネルで分割
          var minR=255,maxR=0,minG=255,maxG=0,minB=255,maxB=0;
          for(var i=0;i<pixels.length;i++){
            if(pixels[i][0]<minR)minR=pixels[i][0];if(pixels[i][0]>maxR)maxR=pixels[i][0];
            if(pixels[i][1]<minG)minG=pixels[i][1];if(pixels[i][1]>maxG)maxG=pixels[i][1];
            if(pixels[i][2]<minB)minB=pixels[i][2];if(pixels[i][2]>maxB)maxB=pixels[i][2];
          }
          var rR=maxR-minR,rG=maxG-minG,rB=maxB-minB;
          var ch=rR>=rG&&rR>=rB?0:rG>=rB?1:2;
          pixels.sort(function(a,b){return a[ch]-b[ch];});
          var mid=Math.floor(pixels.length/2);
          return cut(pixels.slice(0,mid),depth-1).concat(cut(pixels.slice(mid),depth-1));
        }
        var depth=Math.ceil(Math.log2(maxColors));
        return cut(pixels,depth);
      }

      function findNearest(pal,r,g,b){
        var best=0,bestD=1e9;
        for(var i=0;i<pal.length;i++){
          var dr=pal[i][0]-r,dg=pal[i][1]-g,db=pal[i][2]-b;
          var d=dr*dr+dg*dg+db*db;
          if(d<bestD){bestD=d;best=i;}
        }
        return best;
      }

      function quantize(rgba,pal){
        var idx=new Uint8Array(W*H);
        // 近傍キャッシュ
        var cache={};
        for(var i=0,p=0;i<rgba.length;i+=4,p++){
          var r=rgba[i],g=rgba[i+1],b=rgba[i+2];
          // 5bit丸めでキャッシュキーを作る（速度優先）
          var key=((r>>3)<<10)|((g>>3)<<5)|(b>>3);
          if(cache[key]===undefined)cache[key]=findNearest(pal,r,g,b);
          idx[p]=cache[key];
        }
        return idx;
      }

      // 両フレーム合わせてパレット生成
      var combined=new Uint8Array(rgbaA.length+rgbaB.length);
      combined.set(rgbaA);combined.set(rgbaB,rgbaA.length);
      statusEl.textContent='パレット生成中...';
      var pal=medianCut(combined,256);
      while(pal.length<256)pal.push([0,0,0]);
      pal=pal.slice(0,256);

      statusEl.textContent='フレームをインデックス化中...';
      var idxA=quantize(rgbaA,pal);
      var idxB=quantize(rgbaB,pal);

      statusEl.textContent='フレームをエンコード中...';
      var delay=intervalMs;
      var bytes=encodeGIF(W,H,pal,[idxA,idxB],delay);
      var blob=new Blob([bytes],{type:'image/gif'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;a.download='diff-animation.gif';a.click();
      setTimeout(function(){URL.revokeObjectURL(url);},5000);
      btn.disabled=false;
      statusEl.textContent='✓ ダウンロード完了！（'+Math.round(blob.size/1024)+'KB）';
      setTimeout(function(){statusEl.textContent='';},4000);
    }catch(e){
      btn.disabled=false;
      statusEl.textContent='エラー: '+e.message;
    }
  },30);
}

function encodeGIF(w,h,pal,frames,delayMs){
  var out=[];
  function byte(b){out.push(b&0xff);}
  function word(v){byte(v&0xff);byte((v>>8)&0xff);}
  function str(s){for(var i=0;i<s.length;i++)byte(s.charCodeAt(i));}

  // Header
  str('GIF89a');
  word(w);word(h);
  byte(0xf7); // global color table, 256 colors
  byte(0);byte(0);
  for(var i=0;i<256;i++){
    if(i<pal.length){byte(pal[i][0]);byte(pal[i][1]);byte(pal[i][2]);}
    else{byte(0);byte(0);byte(0);}
  }

  // Netscape loop extension
  byte(0x21);byte(0xff);byte(0x0b);
  str('NETSCAPE2.0');
  byte(3);byte(1);word(0);byte(0);

  var delayCentisec=Math.max(1,Math.round(delayMs/10));

  for(var f=0;f<frames.length;f++){
    // Graphic control ext
    byte(0x21);byte(0xf9);byte(4);
    byte(0); // disposal=0
    word(delayCentisec);
    byte(0);byte(0); // no transparent

    // Image descriptor
    byte(0x2c);
    word(0);word(0);word(w);word(h);
    byte(0); // no local color table

    // LZW compressed image data
    var lzw=lzwEncode(frames[f],8);
    byte(8); // min code size
    // write in 255-byte blocks
    var pos=0;
    while(pos<lzw.length){
      var block=Math.min(255,lzw.length-pos);
      byte(block);
      for(var j=0;j<block;j++)byte(lzw[pos+j]);
      pos+=block;
    }
    byte(0); // block terminator
  }

  byte(0x3b); // trailer
  return new Uint8Array(out);
}

function lzwEncode(indices,minCodeSize){
  var clearCode=1<<minCodeSize;
  var eofCode=clearCode+1;
  var codeSize=minCodeSize+1;
  var nextCode=eofCode+1;
  var table={};
  var out=[];
  var buf=0,bufBits=0;

  function emit(code){
    buf|=(code<<bufBits);
    bufBits+=codeSize;
    while(bufBits>=8){out.push(buf&0xff);buf>>=8;bufBits-=8;}
  }
  function resetTable(){
    table={};
    for(var i=0;i<clearCode;i++)table[''+i]=i;
    nextCode=eofCode+1;codeSize=minCodeSize+1;
  }

  resetTable();
  emit(clearCode);
  var str2=''+indices[0];
  for(var i=1;i<indices.length;i++){
    var c=indices[i];
    var s=str2+','+c;
    if(table[s]!==undefined){
      str2=s;
    } else {
      emit(table[str2]);
      if(nextCode<4096){
        table[s]=nextCode++;
        if(nextCode>(1<<codeSize)&&codeSize<12)codeSize++;
      } else {
        emit(clearCode);
        resetTable();
      }
      str2=''+c;
    }
  }
  emit(table[str2]);
  emit(eofCode);
  if(bufBits>0)out.push(buf&0xff);
  return out;
// ---- SHARE (URLエンコード方式) ----
function shareDiff(){
  var before=document.getElementById('ta-before').value;
  var after=document.getElementById('ta-after').value;
  if(!before&&!after)return;
  try{
    var data=JSON.stringify({b:before,a:after});
    var encoded=btoa(unescape(encodeURIComponent(data)));
    var url=location.href.split('#')[0]+'#diff='+encoded;
    document.getElementById('share-url-input').value=url;
    // URLが長い場合は警告
    var warn=document.getElementById('share-warn');
    if(url.length>4000){
      warn.textContent='⚠ テキストが長いためURLが'+url.length+'文字になっています。一部のSNSや環境では開けない場合があります。';
      warn.style.color='#ff9090';
    } else {
      warn.textContent='✓ URL長: '+url.length+'文字（問題ありません）';
      warn.style.color='var(--accent)';
    }
    document.getElementById('share-modal').style.display='flex';
  }catch(e){
    alert('共有リンクの生成に失敗しました。');
  }
}

function copyShareUrl(){
  var input=document.getElementById('share-url-input');
  var text=input.value;
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(function(){
      var btn=event.target;btn.textContent='コピー済み！';
      setTimeout(function(){btn.textContent='コピー';},2000);
    });
  } else {
    input.select();document.execCommand('copy');
    var btn=event.target;btn.textContent='コピー済み！';
    setTimeout(function(){btn.textContent='コピー';},2000);
  }
}

// ページ読み込み時にURLハッシュから差分を復元
function restoreFromHash(){
  var hash=location.hash;
  if(!hash||hash.indexOf('#diff=')<0)return;
  try{
    var encoded=hash.replace('#diff=','');
    var data=JSON.parse(decodeURIComponent(escape(atob(encoded))));
    if(data.b!==undefined)document.getElementById('ta-before').value=data.b;
    if(data.a!==undefined)document.getElementById('ta-after').value=data.a;
    updateCount();
    // 自動的に差分を表示
    setTimeout(function(){
      runDiff();
      // テキストタブを選択
      document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
      document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
      document.querySelector('.tab').classList.add('active');
      document.getElementById('text-panel').classList.add('active');
      document.getElementById('action-bar').style.display='flex';
    },100);
  }catch(e){
    // ハッシュが不正な場合は無視
  }
}
